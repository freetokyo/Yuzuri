name: Yuzuri
options:
  bundleIdPrefix: com.chen
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: ja
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  YuzuriKit:
    path: YuzuriKit

settings:
  base:
    DEVELOPMENT_TEAM: QM4TX6386A
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  Yuzuri:
    type: application
    platform: iOS
    sources:
      - path: Yuzuri
    dependencies:
      - package: YuzuriKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chen.yuzuri
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: Yuzuri
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        CODE_SIGN_STYLE: Automatic

  YuzuriTests:
    type: bundle.unit-test
    platform: iOS
    sources: [YuzuriTests]
    dependencies:
      - target: Yuzuri
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chen.yuzuri.tests
        CODE_SIGN_STYLE: Automatic

  YuzuriUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [YuzuriUITests]
    dependencies:
      - target: Yuzuri
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chen.yuzuri.uitests
        CODE_SIGN_STYLE: Automatic

schemes:
  Yuzuri:
    build:
      targets:
        Yuzuri: all
    run:
      config: Debug
      storeKitConfiguration: Yuzuri/Yuzuri.storekit
    test:
      config: Debug
      storeKitConfiguration: Yuzuri/Yuzuri.storekit
      targets:
        - YuzuriTests
        - YuzuriUITests
    archive:
      config: Release
