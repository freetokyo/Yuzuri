    <h1>Yuzuri プライバシーポリシー</h1>
    <p>最終更新: 2026年</p>
    <p>Yuzuri（以下「本アプリ」）は、利用者のプライバシーを最優先します。</p>
    <h2>収集する情報</h2>
    <p>本アプリは個人情報・利用データを一切収集しません。すべての処理は端末内で完結し、外部送信はありません。アカウント登録は不要です。</p>
    <h2>第三者提供</h2>
    <p>収集するデータが存在しないため、第三者への提供もありません。解析 SDK・広告 SDK は使用していません。</p>
