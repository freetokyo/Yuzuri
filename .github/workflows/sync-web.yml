name: sync-web
on:
  push:
    branches: [main]
    paths:
      - "web/**"
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this app
        uses: actions/checkout@v4
      - name: Checkout public web hub
        uses: actions/checkout@v4
        with:
          repository: freetokyo/web
          token: ${{ secrets.WEB_SYNC_TOKEN }}
          path: web-hub
      - name: Copy app web into hub
        run: |
          mkdir -p web-hub/yuzuri
          rsync -av --delete web/ web-hub/yuzuri/
      - name: Commit & push
        run: |
          cd web-hub
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "sync: yuzuri web"
          git push
